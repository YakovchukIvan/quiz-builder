services:
  postgres:
    image: postgres:17.6
    container_name: quiz-postgres
    restart: always
    ports:
      - '5555:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quiz_builder
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
